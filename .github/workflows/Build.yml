name: Build

on:
  push:
    branches: [master, branch-*]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '42 02 * * *' # 02:42 daily

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

jobs:
  build:
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.head_ref || github.ref_name }}  # Default behaviour is to checkout the commit in detached HEAD state, but this causes warnings in the pipeline. So we explicitly checkout the branch
      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
          tool_versions: |
            java 21
            maven 3.9
      - name: Build, deploy and analyze
        uses: SonarSource/ci-github-actions/build-maven@v1
        with:
          deploy-pull-request: true
          artifactory-deployer-role: qa-deployer

  promote:
    needs: [build]
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Promote
        uses: SonarSource/ci-github-actions/promote@v1
        with:
          promote-pull-request: true
